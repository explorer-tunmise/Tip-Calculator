<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexedDB</title>
    <style>
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 1rem;
            margin-right: 0.5rem;
        }

        input {
            padding: 0.5rem;
            font-size: 1rem;
            margin-right: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 0.5rem;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>
    <h1>INDEXEDDB STORAGE</h1>
    <div>
        <label for="name">Enter your name:</label>
        <input type="text" id="name">

        <label for="contact">Enter your contact:</label>
        <input type="tel" id="contact">

        <button onclick="saveContact()">Save Data</button>

        <table id="contacts-list">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Contact</th>
                </tr>
            </thead>
            <tbody id="dataDisplay">
                <!-- Data will be displayed here -->
            </tbody>
        </table>
    </div>

    <script>
        // Start opening (or creating) a database called "contactsDB"
        // This operation is asynchronous, so it returns a request object
        // The browser will notify us later when it's ready (using events like onsuccess)
        //The "request" word is just like a convention to indicate that the database isn't created immediately
        //Hence any word aside from "request" can be used to. It is just there to store the result
        const request = IndexedDB.open("contactsDB", 1)


        //Once the request is ready and possibly and upgrade to the database is needed, then
        //fire this function
        request.onupgradeneeded = function(event) {
            const db = event.target.result

            if(!db.objectStoreNames.contains("contacts")) {
                db.createObjectStore("contacts", {keyPath: "id", autoIncrement:true })
            }
        }


        request.onsuccess = function(event) {
            const db = event.target.result

            //displayContacts(db) //any initial data should be displayed on completion of creating the database or upgrading
        }

        function saveContact() {
            const db = request.result

            const name = document.getElementById("name").value
            const phone = document.getElementById("contact").value

            if(name && phone) {
                const transaction = db.transaction(["contacts"], "readwrite")
                const store = transaction.objectStore("contacts")

                const contact = { name, phone }
                store.add(contact)

                transaction.oncomplete = function() {
                    displayContacts()
                    document.getElementById("name").value = ""
                     document.getElementById("contact").value = ""
                }
            } else {
                alert("Enter your details, please!")
            }
        }

        function displayContacts(db) {
            const transaction = db.transaction(["contacts"], "readonly")
            const store = transaction.objectStore("contacts")

            const contacts = store.getAll()

            transaction.onsuccess = function () {
                const tbody = document.getElementById("dataDisplay")
                tbody.innerHTML = ""

                contacts.array.forEach(contact => {

                });
            }
        }

    </script>
</body>

</html>
